nameOverride: api
fullnameOverride: api

image:
  repository: ghcr.io/REPLACE_ME/shuttle-go
  tag: latest
  tags:
    blue: latest
    green: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-pull

awsModels:
  secretName: ""
  key: endpoints.json
  mountPath: /root/.aws/models/endpoints.json

serviceAccount:
  create: true
  name: ""
  annotations: {}

lease:
  enabled: true
  name: db-publish-lease
  durationSec: 120
  acquireTimeoutSec: 60

slotReplicas:
  blue: 1
  green: 0

traffic:
  blue: 100
  green: 0

backend:
  existingSecret: backend-env
  dataClaimName: app-db
  mountDataVolume: false
  appVersionBySlot:
    blue: ""
    green: ""
  env:
    APP_VERSION: ""
    OTP_BASE_URL: http://otp:8082
    USER_STORE_BACKEND: postgres
    USER_STORE_POSTGRES_HOST: db-rw-pooler.data.svc.cluster.local
    USER_STORE_POSTGRES_PORT: "5432"
    USER_STORE_POSTGRES_DB: shuttlego
    USER_STORE_POSTGRES_USER: shuttlego
    SESSION_TOUCH_MIN_INTERVAL_SEC: "0"
    CORS_ORIGINS: ""
  dbSync:
    enabled: false
    intervalSec: 300
    jitterSec: 30
    warmCacheOnUpdate: false
    defaultPrefix: db/dev
    s3:
      bucket: ""
      prefix: db/dev
      manifestKey: db/dev/latest.json
      region: ap-northeast-2
  warmEndpointCacheOnStartup: true
  enableBackgroundWorkers: false
  refreshAuthMetricsOnStartup: false
  historyWrite:
    enabled: true
    mode: async
    sampleRates:
      placeUser: 1.0
      placeAnon: 1.0
      routeUser: 1.0
      routeAnon: 1.0
    sampling:
      algorithm: deterministic_hash
      bucketSeconds: 300
      salt: history-v1
    queue:
      maxItems: 10000
      fullStrategy: drop
    batch:
      maxItems: 200
      flushIntervalMs: 250
      maxRetry: 2
      retryBackoffMs: 100
    shutdown:
      drainTimeoutMs: 2000

ingress:
  host: api.example.com

cronJobs:
  nodeSelector: null
  tolerations: []
  authCleanup:
    enabled: true
    schedule: "17 * * * *"
    concurrencyPolicy: Forbid
    suspend: false
    startingDeadlineSeconds: 1200
    backoffLimit: 0
    activeDeadlineSeconds: 600
    ttlSecondsAfterFinished: 600
    successfulJobsHistoryLimit: 2
    failedJobsHistoryLimit: 2
  githubCleanup:
    enabled: true
    schedule: "*/5 * * * *"
    concurrencyPolicy: Forbid
    suspend: false
    startingDeadlineSeconds: 1200
    backoffLimit: 0
    activeDeadlineSeconds: 600
    ttlSecondsAfterFinished: 600
    maxJobsPerRun: 20
    successfulJobsHistoryLimit: 2
    failedJobsHistoryLimit: 2

tmapCollector:
  enabled: false
  replicas: 1
  localDbPath: /app/data/data.db
  requestTimeoutSec: 20
  dailyQuotaLimit: 1000
  quotaCooldownSec: 3600
  publishEveryCalls: 50
  keepRunsPerTarget: 30
  resources: {}
