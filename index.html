      function setMapDimmed(dimmed, highlightIndex) {
        if (dimmed) {
          markerElements.forEach(function(m, i) {
            m.style.opacity = (i === highlightIndex) ? '1' : '0.35';
            m.classList.toggle('hover', i === highlightIndex);
          });
          shuttlePointContents.forEach(function(el) {
            if (el && el.style) el.style.opacity = '0.35';
          });
          setShuttlePathDimmed(true);
          shuttleMessage.classList.add('dimmed');
        } else {
          markerElements.forEach(function(m) {
            m.style.opacity = '';
            m.classList.remove('hover');
          });
          shuttlePointContents.forEach(function(el) {
            if (el && el.style) el.style.opacity = '';
          });
          setShuttlePathDimmed(false);
          shuttleMessage.classList.remove('dimmed');
        }
      }

      function showHoverMarker(index) {
        hideHoverMarker();
        var place = places[index];
        if (!place) return;
        var lat = parseFloat(place.y);
        var lng = parseFloat(place.x);
        var el = document.createElement('div');
        el.className = 'pin-marker hover';
        var overlay = new kakao.maps.CustomOverlay({
          position: new kakao.maps.LatLng(lat, lng),
          content: el,
          yAnchor: 1
        });
        overlay.setMap(map);
        hoverPlaceOverlay = overlay;
      }

      function hideHoverMarker() {
        if (hoverPlaceOverlay) {
          hoverPlaceOverlay.setMap(null);
          hoverPlaceOverlay = null;
        }
      }

      function clearHoverBubbleCloseTimer() {
        if (!hoverBubbleCloseTimer) return;
        clearTimeout(hoverBubbleCloseTimer);
        hoverBubbleCloseTimer = null;
      }

      function clearHoverMarkerState() {
        markerElements.forEach(function(m) { m.classList.remove('hover'); });
        resultsList.querySelectorAll('.result-card').forEach(function(c) { c.classList.remove('highlight'); });
      }

      function scheduleHoverBubbleClose(index) {
        clearHoverBubbleCloseTimer();
        hoverBubbleCloseTimer = setTimeout(function() {
          hoverBubbleCloseTimer = null;
          if (selectedPlaceIndex >= 0) return;
          if (!bubbleOverlay || !bubbleState || bubbleState.source !== 'hover') return;
          var box = bubbleOverlay.querySelector('.bubble-box');
          if (box && typeof box.matches === 'function' && box.matches(':hover')) return;
          var idx = Number(index);
          var markerEl = (isFinite(idx) && idx >= 0 && idx < markerElements.length) ? markerElements[idx] : null;
          if (markerEl && typeof markerEl.matches === 'function' && markerEl.matches(':hover')) return;
          if (isFinite(idx) && idx >= 0) onMarkerHover(idx, false);
          else clearHoverMarkerState();
          closeBubble();
        }, 90);
      }

      function activatePlaceSelection(index, options) {
        options = options || {};
        var place = places[index];
        if (!place) return;
        var lat = parseFloat(place.y);
        var lng = parseFloat(place.x);
        if (!isFinite(lat) || !isFinite(lng)) return;
        var shouldShowBubble = options.showBubble !== false;
        var preserveSheetState = !!options.preserveSheetState;
        var recenterAfterSheetTransition = !!options.recenterAfterSheetTransition;
        clearHoverBubbleCloseTimer();
        closeBubble();
        selectPlace(index);
        setMapDimmed(true, index);
        if (isMobile() && resultsPanel && !preserveSheetState) {
          // 시트를 내리되 adjustMapForSheet는 건너뜀 (panTo를 보존)
          resultsPanel.classList.remove('sheet-peek', 'sheet-half', 'sheet-full');
          resultsPanel.classList.add('sheet-peek');
        }
        panTo(lat, lng);
        if (isMobile() && recenterAfterSheetTransition) {
          setTimeout(function() {
            if (selectedPlaceIndex !== index) return;
            if (!resultsPanel || !resultsPanel.classList.contains('sheet-peek')) return;
            panTo(lat, lng);
          }, 280);
        }
        if (shouldShowBubble) {
          if (isMobile()) {
            setTimeout(function() { showBubble(index); }, 60);
          } else {
            showBubble(index);
          }
        }
      }

      function closeBubble() {
        clearHoverBubbleCloseTimer();
        if (bubbleOverlay) {
          if (bubbleOverlay.parentNode) bubbleOverlay.parentNode.removeChild(bubbleOverlay);
          bubbleOverlay = null;
        }
        bubbleState = null;
      }

      function closeBubbleIfOutside(e) {
        if (!bubbleOverlay) return;
        if (Date.now() - bubbleOpenedAt < 200) return;
        if (bubbleOverlay.contains(e.target)) return;
        if (mapContainer && e.target && mapContainer.contains(e.target)) return;
        bubbleClosedByOutsideAt = Date.now();
        closeBubble();
        deselectPlace();
        setMapDimmed(false);
      }

      function getBubblePinTopOffset(hasPin) {
        if (!hasPin) return 0;
        var pinScale = parseFloat(mapContainer.style.getPropertyValue('--pin-scale')) || 1;
        return Math.round(16 * pinScale);
      }

      function getBubbleMarkerAnchorPoint(markerIndex) {
        var idx = Number(markerIndex);
        if (!isFinite(idx) || idx < 0 || idx >= markerElements.length) return null;
        var markerEl = markerElements[idx];
        if (!markerEl || !mapContainer) return null;
        var markerRect = markerEl.getBoundingClientRect();
        var mapRect = mapContainer.getBoundingClientRect();
        if (!markerRect.width || !markerRect.height || !mapRect.width || !mapRect.height) return null;
        return {
          x: markerRect.left - mapRect.left + markerRect.width / 2 + 2,
          y: markerRect.top - mapRect.top + 2
        };
      }

      function positionBubbleOverlay(container, lat, lng, hasPin, markerIndex) {
        if (!container || !map || !mapContainer) return;
        var box = container.querySelector('.bubble-box');
        if (!box) return;
        var pos = new kakao.maps.LatLng(lat, lng);
        var proj = map.getProjection();
        var clickX;
        var clickY;
        if (proj && typeof proj.containerPointFromCoords === 'function') {
          var clickPt = proj.containerPointFromCoords(pos);
          clickX = clickPt.x;
          clickY = clickPt.y;
        } else {
          clickX = mapContainer.clientWidth / 2;
          clickY = mapContainer.clientHeight / 2;
        }
        var mapW = mapContainer.clientWidth;
        var mapH = mapContainer.clientHeight;
        var boxW = box.offsetWidth || 0;
        var boxH = box.offsetHeight || 0;
        if (boxW <= 0 || boxH <= 0) return;
        var pad = 8;
        var tailLen = 7;
        var tailBaseWidth = 12;
        var markerAnchor = hasPin ? getBubbleMarkerAnchorPoint(markerIndex) : null;
        var tailTipX = markerAnchor ? markerAnchor.x : clickX;
        var tailTipY = markerAnchor ? markerAnchor.y : (clickY - getBubblePinTopOffset(hasPin));

        // 화면 밖 마커일 때: markerTracker처럼 화면 경계로 꼬리 끝점을 보정해
        // 말풍선이 마커 방향을 가리키도록 유지한다.
        var edgePad = 22;
        var isOutsideViewport =
          clickX < edgePad ||
          clickX > (mapW - edgePad) ||
          clickY < edgePad ||
          clickY > (mapH - edgePad);
        if (isOutsideViewport) {
          var centerX = mapW / 2;
          var centerY = mapH / 2;
          var dx = clickX - centerX;
          var dy = clickY - centerY;
          if (Math.abs(dx) < 0.001 && Math.abs(dy) < 0.001) {
            dy = -1;
          }
          var t = Infinity;
          if (Math.abs(dx) > 0.001) {
            if (dx > 0) t = Math.min(t, (mapW - edgePad - centerX) / dx);
            else t = Math.min(t, (edgePad - centerX) / dx);
          }
          if (Math.abs(dy) > 0.001) {
            if (dy > 0) t = Math.min(t, (mapH - edgePad - centerY) / dy);
            else t = Math.min(t, (edgePad - centerY) / dy);
          }
          if (!isFinite(t) || t < 0) t = 0;
          tailTipX = centerX + dx * t;
          tailTipY = centerY + dy * t;
          hasPin = false;
        }

        var boxLeft = tailTipX - boxW / 2;
        var boxTop = tailTipY - boxH - tailLen;

        if (boxLeft < pad) boxLeft = pad;
        if (boxLeft + boxW > mapW - pad) boxLeft = mapW - pad - boxW;

        if (boxTop < pad) {
          if (hasPin) {
            if (markerAnchor) {
              tailTipY = markerAnchor.y + 8;
            } else {
              var pinScale = parseFloat(mapContainer.style.getPropertyValue('--pin-scale')) || 1;
              var belowOffset = Math.max(6, Math.round(10 * pinScale));
              tailTipY = clickY + belowOffset;
            }
          }
          boxTop = tailTipY + tailLen;
        }
        if (boxTop + boxH > mapH - pad) {
          boxTop = mapH - pad - boxH;
        }
        if (boxTop < pad) boxTop = pad;

        box.style.left = Math.round(boxLeft) + 'px';
        box.style.top = Math.round(boxTop) + 'px';

        var existingTail = container.querySelector('.bubble-tail-svg');
        if (existingTail && existingTail.parentNode) existingTail.parentNode.removeChild(existingTail);

        var boxRect = { left: boxLeft, top: boxTop, width: boxW, height: boxH };
        var tailBase = getBubbleTailBase(boxRect, tailTipX, tailTipY, tailBaseWidth);
        if (tailBase) {
          var svgNS = 'http://www.w3.org/2000/svg';
          var svg = document.createElementNS(svgNS, 'svg');
          svg.setAttribute('class', 'bubble-tail-svg');
          var poly = document.createElementNS(svgNS, 'polygon');
          poly.setAttribute('points',
            tailBase.p1.x + ',' + tailBase.p1.y + ' ' +
            tailTipX + ',' + tailTipY + ' ' +
            tailBase.p2.x + ',' + tailBase.p2.y
          );
          poly.setAttribute('fill', '#fff');
          svg.appendChild(poly);
          container.insertBefore(svg, box);
        }
      }

      function refreshBubbleOverlayPosition() {
        if (!bubbleOverlay || !bubbleState) return;
        positionBubbleOverlay(
          bubbleOverlay,
          bubbleState.lat,
          bubbleState.lng,
          bubbleState.hasPin,
          bubbleState.markerIndex
        );
      }

      function syncBubblePositionAfterMarkerTransform() {
        var offsets = [0, 40, 90, 150, 220];
        offsets.forEach(function(ms) {
          setTimeout(function() {
            refreshBubbleOverlayPosition();
          }, ms);
        });
      }

      function showBubble(index, source) {
        clearHoverBubbleCloseTimer();
        closeBubble();
        var place = places[index];
        if (!place) return;
        var lat = parseFloat(place.y);
        var lng = parseFloat(place.x);
        showBubbleWithPlace(place, lat, lng, true, index, source || 'selected');
        syncBubblePositionAfterMarkerTransform();
      }

      function blurActiveSearchInputs() {
        if (searchInput && document.activeElement === searchInput) {
          searchInput.blur();
        }
        if (routeTopPlaceLabel && document.activeElement === routeTopPlaceLabel) {
          routeTopPlaceLabel.blur();
        }
        if (routeBottomPlaceLabel && document.activeElement === routeBottomPlaceLabel) {
          routeBottomPlaceLabel.blur();
        }
      }

      function blurFocusedRouteModePlaceInputIfActive() {
        if (!routeModeDirection) return false;
        var active = document.activeElement;
        if (!active) return false;
        if (routeTopPlaceLabel && active === routeTopPlaceLabel && !routeTopPlaceLabel.classList.contains('route-mode-hidden')) {
          routeTopPlaceLabel.blur();
          return true;
        }
        if (routeBottomPlaceLabel && active === routeBottomPlaceLabel && !routeBottomPlaceLabel.classList.contains('route-mode-hidden')) {
          routeBottomPlaceLabel.blur();
          return true;
        }
        return false;
      }

      function handleMobileSelectedPlaceTapToCollapseSheet() {
        if (!isMobile() || !resultsPanel) return false;
        var expanded = resultsPanel.classList.contains('sheet-half') || resultsPanel.classList.contains('sheet-full');
        if (!expanded) return false;
        if (selectedPlaceIndex >= 0) {
          activatePlaceSelection(selectedPlaceIndex, {
            source: 'mobile-map-blank',
            showBubble: true,
            preserveSheetState: false,
            recenterAfterSheetTransition: true
          });
        } else {
          setSheetState('sheet-peek');
          closeBubble();
          setMapDimmed(false);
        }
        return true;
      }

      function showBubbleAtPosition(lat, lng) {
        blurActiveSearchInputs();
        closeBubble();
        var place = {
          place_name: '선택한 위치',
          address_name: '',
          y: lat,
          x: lng,
          _place_source: 'map'
        };
        showBubbleWithPlace(place, lat, lng, false, null, 'manual');
      }

      function showBubbleWithPlace(place, lat, lng, hasPin, markerIndex, source) {
        closeBubble();
        var numericLat = Number(lat);
        var numericLng = Number(lng);
        if (!isFinite(numericLat) || !isFinite(numericLng)) return;

        // 박스 생성
        var box = document.createElement('div');
        box.className = 'bubble-box';
        box.innerHTML =
          '<div class="bubble-header">' +
          '<span class="bubble-name">' + escapeHtml(place.place_name || '') + '</span>' +
          '<button type="button" class="bubble-close" title="닫기" aria-label="닫기">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
          '</button></div>' +
          '<div class="bubble-addr">' + escapeHtml(place.address_name || '') + '</div>' +
          '<div class="bubble-actions">' +
          '<button type="button" class="btn-depart">출발</button>' +
          '<button type="button" class="btn-arrive">도착</button>' +
          '</div>';

        // 컨테이너 생성 및 임시 추가 (크기 측정)
        var container = document.createElement('div');
        container.className = 'bubble-container';
        container.appendChild(box);
        mapContainer.appendChild(container);

        positionBubbleOverlay(container, numericLat, numericLng, hasPin, markerIndex);

        // 이벤트 핸들러
        function dismissBubble() {
          closeBubble();
          deselectPlace();
          setMapDimmed(false);
        }
        function closeBubbleIfNotButtons(e) {
          e.stopPropagation();
          if (e.target.closest('.bubble-actions button')) return;
          e.preventDefault();
          dismissBubble();
        }
        box.addEventListener('click', closeBubbleIfNotButtons);
        box.addEventListener('touchend', closeBubbleIfNotButtons, { passive: false });
        box.querySelector('.bubble-close').addEventListener('click', function(e) {
          e.stopPropagation();
          e.preventDefault();
          dismissBubble();
        });
        box.querySelector('.bubble-close').addEventListener('touchend', function(e) {
          e.stopPropagation();
          e.preventDefault();
          dismissBubble();
        });
        box.querySelector('.btn-depart').addEventListener('click', function(e) {
          e.stopPropagation();
          e.preventDefault();
          closeBubble();
          runDepartWithPlace(place);
        });
        box.querySelector('.btn-arrive').addEventListener('click', function(e) {
          e.stopPropagation();
          e.preventDefault();
          closeBubble();
          runArriveWithPlace(place);
        });
        if (!isMobile() && source === 'hover') {
          box.addEventListener('mouseenter', function() {
            clearHoverBubbleCloseTimer();
          });
          box.addEventListener('mouseleave', function() {
            scheduleHoverBubbleClose(markerIndex);
          });
        }

        bubbleOverlay = container;
        bubbleState = {
          place: place,
          lat: numericLat,
          lng: numericLng,
          hasPin: !!hasPin,
          markerIndex: (isFinite(Number(markerIndex)) ? Number(markerIndex) : -1),
          source: source || 'manual'
        };
        bubbleOpenedAt = Date.now();
      }

      function getBubbleTailBase(boxRect, tipX, tipY, baseWidth) {
        var cx = boxRect.left + boxRect.width / 2;
        var cy = boxRect.top + boxRect.height / 2;
        var dx = tipX - cx;
        var dy = tipY - cy;
        var hw = boxRect.width / 2;
        var hh = boxRect.height / 2;
        var halfBase = baseWidth / 2;

        // 클릭 지점이 박스 내부이면 꼬리 불필요
        if (Math.abs(dx) <= hw + 4 && Math.abs(dy) <= hh + 4) return null;

        var scaleX = Math.abs(dx) > 0.001 ? hw / Math.abs(dx) : 99999;
        var scaleY = Math.abs(dy) > 0.001 ? hh / Math.abs(dy) : 99999;

        if (scaleX < scaleY) {
          // 좌우 변에서 꼬리 시작
          var edgeX = dx > 0 ? boxRect.left + boxRect.width : boxRect.left;
          var edgeY = cy + dy * scaleX;
          edgeY = Math.max(boxRect.top + halfBase + 8, Math.min(boxRect.top + boxRect.height - halfBase - 8, edgeY));
          var inset = dx > 0 ? -2 : 2;
          return {
            p1: { x: edgeX + inset, y: edgeY - halfBase },
            p2: { x: edgeX + inset, y: edgeY + halfBase }
          };
        } else {
          // 상하 변에서 꼬리 시작
          var edgeY2 = dy > 0 ? boxRect.top + boxRect.height : boxRect.top;
          var edgeX2 = cx + dx * scaleY;
          edgeX2 = Math.max(boxRect.left + halfBase + 8, Math.min(boxRect.left + boxRect.width - halfBase - 8, edgeX2));
          var inset2 = dy > 0 ? -2 : 2;
          return {
            p1: { x: edgeX2 - halfBase, y: edgeY2 + inset2 },
            p2: { x: edgeX2 + halfBase, y: edgeY2 + inset2 }
          };
        }
      }

      function selectPlace(index) {
        selectedPlaceIndex = index;
        resultsList.querySelectorAll('.result-card').forEach(function(c, i) {
          c.classList.toggle('selected', i === index);
        });
        markerElements.forEach(function(m, i) {
          m.classList.toggle('selected', i === index);
          m.classList.remove('hover');
        });
        overlays.forEach(function(o, i) {
          o.setZIndex(i === index ? 100 : 0);
        });
        resultsList.querySelectorAll('.result-card').forEach(function(c) {
          c.classList.remove('highlight');
        });
      }

      function deselectPlace() {
        selectedPlaceIndex = -1;
        resultsList.querySelectorAll('.result-card').forEach(function(c) {
          c.classList.remove('selected');
        });
        markerElements.forEach(function(m) {
          m.classList.remove('selected', 'hover');
        });
        overlays.forEach(function(o) {
          o.setZIndex(0);
        });
      }

      function fitBounds() {
        if (overlays.length === 0) return;
        var bounds = new kakao.maps.LatLngBounds();
        overlays.forEach(function(o) { bounds.extend(o.getPosition()); });
        map.setBounds(bounds);
      }

      function panTo(lat, lng) {
        var place = new kakao.maps.LatLng(lat, lng);
        if (isMobile() && resultsPanel && mapContainer) {
          var sheetHeight = parseFloat(window.getComputedStyle(resultsPanel).height, 10);
          if (!isNaN(sheetHeight) && sheetHeight > 0) {
            if (panToVisibleCenterRafId != null) {
              cancelAnimationFrame(panToVisibleCenterRafId);
              panToVisibleCenterRafId = null;
            }
            var mapWidth = mapContainer.clientWidth || 0;
            var mapHeight = mapContainer.clientHeight || 0;
            map.setCenter(place);
            panToVisibleCenterRafId = requestAnimationFrame(function() {
              panToVisibleCenterRafId = null;
              var proj = map.getProjection();
              if (!proj) return;
              var targetCenterPixelY = mapHeight / 2 + sheetHeight / 2;
              var pt = new kakao.maps.Point(mapWidth / 2, targetCenterPixelY);
              var newCenter = null;
              if (typeof proj.coordsFromContainerPoint === 'function') {
                newCenter = proj.coordsFromContainerPoint(pt);
              } else if (typeof proj.coordsFromPoint === 'function') {
                newCenter = proj.coordsFromPoint(pt);
              }
              if (newCenter && typeof newCenter.getLat === 'function' && typeof newCenter.getLng === 'function') {
                map.setCenter(newCenter);
              }
            });
          } else {
            map.panTo(place);
          }
        } else {
          map.panTo(place);
        }
      }

      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function formatDistance(m) {
        if (m == null || isNaN(m)) return '-';
        var num = Number(m);
        if (num >= 1000) return (num / 1000).toFixed(2) + 'km';
        return Math.round(num) + 'm';
      }

      function haversineDistanceMeters(fromPos, toPos) {
        if (!fromPos || !toPos) return NaN;
        var lat1 = Number(fromPos.lat);
        var lng1 = Number(fromPos.lng);
        var lat2 = Number(toPos.lat);
        var lng2 = Number(toPos.lng);
        if (!isFinite(lat1) || !isFinite(lng1) || !isFinite(lat2) || !isFinite(lng2)) return NaN;
        var R = 6371000;
        var dLat = (lat2 - lat1) * Math.PI / 180;
        var dLng = (lng2 - lng1) * Math.PI / 180;
        var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
          Math.sin(dLng / 2) * Math.sin(dLng / 2);
        var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
      }

      function estimateWalkDurationSec(distanceM) {
        var distance = Number(distanceM);
        if (!isFinite(distance) || distance <= 0) return null;
        return Math.max(60, Math.round(distance / WALK_ESTIMATED_SPEED_MPS));
      }

      function parseHHMMToMinutes(hhmm) {
        var text = String(hhmm || '').trim();
        var parts = text.split(':');
        if (parts.length !== 2) return null;
        var h = Number(parts[0]);
        var m = Number(parts[1]);
        if (!isFinite(h) || !isFinite(m)) return null;
        if (h < 0 || h > 23 || m < 0 || m > 59) return null;
        return h * 60 + m;
      }

      function formatMinutesToHHMM(minutes) {
        var value = Number(minutes);
        if (!isFinite(value)) return '';
        var total = Math.round(value);
        while (total < 0) total += 24 * 60;
        total = total % (24 * 60);
        var h = Math.floor(total / 60);
        var m = total % 60;
        return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
      }

      function addDurationToHHMM(baseHHMM, durationSec) {
        var baseMinutes = parseHHMMToMinutes(baseHHMM);
        if (baseMinutes == null) return '';
        var dur = Number(durationSec);
        if (!isFinite(dur) || dur < 0) return formatMinutesToHHMM(baseMinutes);
        return formatMinutesToHHMM(baseMinutes + dur / 60);
      }

      function getOptionWalkLegPositions(positions, isDepart) {
        if (!Array.isArray(positions)) return null;
        if (isDepart) {
          if (positions.length < 2) return null;
          return { fromPos: positions[0], toPos: positions[1] };
        }
        if (positions.length < 3) return null;
        return { fromPos: positions[1], toPos: positions[2] };
      }

      function buildStraightWalkInfo(positions, isDepart) {
        var leg = getOptionWalkLegPositions(positions, isDepart);
        if (!leg) {
          return { distance_m: null, duration_sec: null };
        }
        var distanceM = haversineDistanceMeters(leg.fromPos, leg.toPos);
        var durationSec = estimateWalkDurationSec(distanceM);
        return {
          distance_m: isFinite(distanceM) ? distanceM : null,
          duration_sec: durationSec
        };
      }

      function buildStraightLineFallbackWalkInfo(positions, isDepart, reason) {
        var straight = buildStraightWalkInfo(positions, isDepart);
        return {
          distance_m: straight.distance_m,
          duration_sec: straight.duration_sec,
          fallback_type: 'straight_line',
          fallback_reason: String(reason || 'straight_fallback')
        };
      }

      function isSuccessfulWalkPathResult(walkInfo) {
        if (!walkInfo) return false;
        if (walkInfo.has_route !== true) return false;
        return Array.isArray(walkInfo.path_points) && walkInfo.path_points.length > 0;
      }

      function isWalkOtpBackoffActive() {
        return Date.now() < walkOtpTimeoutSkipUntilMs;
      }

      function registerWalkOtpTimeoutBackoff() {
        var cooldownMs = WALK_OTP_TIMEOUT_BACKOFF_INITIAL_MS * Math.pow(2, walkOtpTimeoutBackoffStep);
        walkOtpTimeoutBackoffStep += 1;
        walkOtpTimeoutSkipUntilMs = Date.now() + cooldownMs;
      }

      function resetWalkOtpTimeoutBackoff() {
        walkOtpTimeoutBackoffStep = 0;
        walkOtpTimeoutSkipUntilMs = 0;
      }

      function buildWalkPathCacheKey(fromPos, toPos) {
        var fromLat = Number(fromPos && fromPos.lat);
        var fromLng = Number(fromPos && fromPos.lng);
        var toLat = Number(toPos && toPos.lat);
        var toLng = Number(toPos && toPos.lng);
        if (!isFinite(fromLat) || !isFinite(fromLng) || !isFinite(toLat) || !isFinite(toLng)) return '';
        return fromLat.toFixed(6) + ',' + fromLng.toFixed(6) + '->' + toLat.toFixed(6) + ',' + toLng.toFixed(6);
      }

      function setWalkPathCache(key, value) {
        if (!key) return;
        walkPathCache.set(key, value);
        if (walkPathCache.size > 2000) {
          var firstKey = walkPathCache.keys().next().value;
          if (firstKey != null) walkPathCache.delete(firstKey);
        }
      }

      function fetchWalkPathData(fromPos, toPos) {
        var key = buildWalkPathCacheKey(fromPos, toPos);
        if (!key) return Promise.resolve(null);
        if (walkPathCache.has(key)) return Promise.resolve(walkPathCache.get(key));
        if (walkPathPending.has(key)) return walkPathPending.get(key);

        var url = API_BASE + '/api/shuttle/walk-path' +
          '?from_lat=' + encodeURIComponent(String(fromPos.lat)) +
          '&from_lng=' + encodeURIComponent(String(fromPos.lng)) +
          '&to_lat=' + encodeURIComponent(String(toPos.lat)) +
          '&to_lng=' + encodeURIComponent(String(toPos.lng));
        var pending = fetch(url)
          .then(function(r) {
            return r.json().catch(function() { return {}; }).then(function(data) {
              return { ok: r.ok, data: data };
            });
          })
          .then(function(result) {
            var data = result.data || {};
            if (typeof data.walk_otp_enabled === 'boolean' && !data.walk_otp_enabled) {
              walkOtpEnabled = false;
            }
            if (!result.ok) {
              throw new Error(data.error || 'walk_path_request_failed');
            }
            var encoded = String(data.encoded_polyline || '').trim();
            var decoded = encoded ? decodeEncodedPolyline(encoded) : [];
            var distanceM = Number(data.distance_m);
            var durationSec = Number(data.duration_sec);
            var normalized = {
              has_route: !!data.has_route && decoded.length > 0,
              path_points: decoded,
              distance_m: (isFinite(distanceM) && distanceM > 0) ? distanceM : null,
              duration_sec: (isFinite(durationSec) && durationSec > 0) ? durationSec : null,
              status: String(data.status || ''),
              source: String(data.source || ''),
            };
            if (normalized.status === 'ok' || normalized.status.indexOf('empty') === 0 || normalized.status === 'disabled') {
              setWalkPathCache(key, normalized);
            }
            return normalized;
          })
          .finally(function() {
            walkPathPending.delete(key);
          });
        walkPathPending.set(key, pending);
        return pending;
      }

      function promiseWithTimeout(promise, timeoutMs) {
        return new Promise(function(resolve, reject) {
          var settled = false;
          var timer = setTimeout(function() {
            if (settled) return;
            settled = true;
            reject(new Error('walk_path_timeout'));
          }, timeoutMs);
          promise.then(function(value) {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            resolve(value);
          }, function(err) {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            reject(err);
          });
        });
      }

            '<span class="route-step-meta"></span>' +

            if (!isMobile()) return;
            if (!e.touches || e.touches.length !== 1) return;
            var t = e.touches[0];
            cardTouchState = { x: t.clientX, y: t.clientY, moved: false };
          }, { passive: true });
          card.addEventListener('touchmove', function(e) {
            if (!isMobile() || !cardTouchState) return;
            if (!e.touches || !e.touches.length) return;
            var t = e.touches[0];
            var dx = t.clientX - cardTouchState.x;
            var dy = t.clientY - cardTouchState.y;
            if ((dx * dx + dy * dy) > 100) cardTouchState.moved = true;
          }, { passive: true });
          card.addEventListener('touchend', function(e) {
            if (!isMobile() || !cardTouchState) return;
            var moved = cardTouchState.moved;
            cardTouchState = null;
            if (moved) {
              lastMobileCardTouchSelectAt = Date.now();
              return;

            if (e.target && e.target.closest('.card-actions')) return;
            lastMobileCardTouchSelectAt = Date.now();
            e.preventDefault();

            activatePlaceSelection(i, {
              source: 'list',
              showBubble: false,
              preserveSheetState: true
            });
          }, { passive: false });
          card.addEventListener('touchcancel', function() {
            cardTouchState = null;
          }, { passive: true });

          card.addEventListener('click', function(e) {
            if (e.target.closest('.card-actions')) return;
            if (isMobile()) {
              if (Date.now() - lastMobileCardTouchSelectAt < 450) return;
              e.stopPropagation();
              activatePlaceSelection(i, {
                source: 'list',
                showBubble: false,
                preserveSheetState: true
              });

          card.addEventListener('mouseenter', function() { onListCardHover(i, true); });

          resultsList.appendChild(card);

      function showShuttleError(message) {

          clearTimeout(shuttleErrorHideTimer);
          shuttleErrorHideTimer = null;

      function isSamePathPoint(a, b) {
        if (!a || !b) return false;
        return Math.abs((Number(a.lat) || 0) - (Number(b.lat) || 0)) < 1e-6 &&
          Math.abs((Number(a.lng) || 0) - (Number(b.lng) || 0)) < 1e-6;
      }

      function appendPathPoints(target, source) {
        if (!Array.isArray(source) || source.length === 0) return;
        for (var i = 0; i < source.length; i++) {
          var point = source[i];
          if (!point) continue;
          var lat = Number(point.lat);
          var lng = Number(point.lng);
          if (!isFinite(lat) || !isFinite(lng)) continue;
          if (target.length > 0 && isSamePathPoint(target[target.length - 1], { lat: lat, lng: lng })) {
            continue;
          }
          target.push({ lat: lat, lng: lng });
        }
      }

      function appendStraightLeg(pathPoints, fromPos, toPos) {
        if (!fromPos || !toPos) return;
        appendPathPoints(pathPoints, [
          { lat: Number(fromPos.lat), lng: Number(fromPos.lng) },
          { lat: Number(toPos.lat), lng: Number(toPos.lng) }
        ]);
      }

      function decodeEncodedPolyline(encoded) {
        if (!encoded || typeof encoded !== 'string') return [];
        var points = [];
        var index = 0;
        var lat = 0;
        var lng = 0;
        while (index < encoded.length) {
          var result = 0;
          var shift = 0;
          var b;
          do {
            if (index >= encoded.length) return points;
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
          } while (b >= 0x20);
          var dlat = (result & 1) ? ~(result >> 1) : (result >> 1);
          lat += dlat;

          result = 0;
          shift = 0;
          do {
            if (index >= encoded.length) return points;
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
          } while (b >= 0x20);
          var dlng = (result & 1) ? ~(result >> 1) : (result >> 1);
          lng += dlng;

          points.push({ lat: lat / 1e5, lng: lng / 1e5 });
        }
        return points;
      }

      function buildPathFromEncodedSegments(segments) {
        var pathPoints = [];
        if (!Array.isArray(segments)) return pathPoints;
        segments.forEach(function(encoded) {
          var decoded = decodeEncodedPolyline(String(encoded || '').trim());
          appendPathPoints(pathPoints, decoded);
        });
        return pathPoints;
      }

      function buildBusPathPointsFromRouteStops(routeStops, fromSequence, toSequence) {
        if (!Array.isArray(routeStops) || routeStops.length < 2) return [];
        var startSeq = Number(fromSequence);
        var endSeq = Number(toSequence);
        if (!isFinite(startSeq) || !isFinite(endSeq) || endSeq <= startSeq) return [];

        var pathPoints = [];
        for (var i = 0; i < routeStops.length - 1; i++) {
          var current = routeStops[i] || {};
          var next = routeStops[i + 1] || {};
          var currentSeq = Number(current.sequence);
          var nextSeq = Number(next.sequence);
          if (!isFinite(currentSeq) || !isFinite(nextSeq)) continue;
          if (currentSeq < startSeq || currentSeq >= endSeq) continue;
          if (nextSeq <= currentSeq || nextSeq > endSeq) continue;

          var encoded = String(current.next_encoded_polyline || '').trim();
          if (encoded) {
            var decoded = decodeEncodedPolyline(encoded);
            if (decoded.length > 0) {
              appendPathPoints(pathPoints, decoded);
              continue;
            }
          }
          appendStraightLeg(pathPoints, current, next);
        }
        return pathPoints;
      }

      function buildRouteDetailPathPoints(routeStops) {
        var pathPoints = [];
        if (!Array.isArray(routeStops) || routeStops.length === 0) return pathPoints;
        for (var i = 0; i < routeStops.length - 1; i++) {
          var current = routeStops[i] || {};
          var next = routeStops[i + 1] || {};
          var encoded = String(current.next_encoded_polyline || '').trim();
          if (encoded) {
            var decoded = decodeEncodedPolyline(encoded);
            if (decoded.length > 0) {
              appendPathPoints(pathPoints, decoded);
              continue;
            }
          }
          appendStraightLeg(pathPoints, current, next);
        }
        if (pathPoints.length === 0) {
          routeStops.forEach(function(stop) {
            appendPathPoints(pathPoints, [{ lat: Number(stop.lat), lng: Number(stop.lng) }]);
          });
        }
        return pathPoints;
      }

      function buildOptionPathSegments(option, positions, isDepart, walkPathPoints) {
        var routeStops = Array.isArray(option.route_stops) ? option.route_stops : [];
        var fromSeq = isDepart ? option.nearest_stop_sequence : option.start_stop_sequence;
        var toSeq = isDepart ? option.terminus_sequence : option.getoff_stop_sequence;
        var busPathPoints = buildBusPathPointsFromRouteStops(routeStops, fromSeq, toSeq);
        if (busPathPoints.length === 0) {
          busPathPoints = buildPathFromEncodedSegments(option.bus_segment_polylines || []);
        }

        var walkSegmentPoints = [];
        if (isDepart) {
          if (Array.isArray(walkPathPoints) && walkPathPoints.length > 0) {
            appendPathPoints(walkSegmentPoints, walkPathPoints);
          } else if (positions.length >= 2) {
            appendStraightLeg(walkSegmentPoints, positions[0], positions[1]);
          }
          if (busPathPoints.length === 0 && positions.length >= 3) {
            appendStraightLeg(busPathPoints, positions[1], positions[2]);
          }
        } else {
          if (busPathPoints.length === 0 && positions.length >= 2) {
            appendStraightLeg(busPathPoints, positions[0], positions[1]);
          }
          if (Array.isArray(walkPathPoints) && walkPathPoints.length > 0) {
            appendPathPoints(walkSegmentPoints, walkPathPoints);
          } else if (positions.length >= 3) {
            appendStraightLeg(walkSegmentPoints, positions[1], positions[2]);
          }
        }

        var allPathPoints = [];
        if (isDepart) {
          appendPathPoints(allPathPoints, walkSegmentPoints);
          appendPathPoints(allPathPoints, busPathPoints);
        } else {
          appendPathPoints(allPathPoints, busPathPoints);
          appendPathPoints(allPathPoints, walkSegmentPoints);
        }

        if (allPathPoints.length === 0) {
          positions.forEach(function(p) {
            appendPathPoints(allPathPoints, [{ lat: Number(p.lat), lng: Number(p.lng) }]);
          });
        }

        return {
          walkPathPoints: walkSegmentPoints,
          busPathPoints: busPathPoints,
          allPathPoints: allPathPoints
        };
      }

      function interpolatePathPoint(fromPos, toPos, ratio) {
        var t = Math.max(0, Math.min(1, Number(ratio) || 0));
        return {
          lat: Number(fromPos.lat) + (Number(toPos.lat) - Number(fromPos.lat)) * t,
          lng: Number(fromPos.lng) + (Number(toPos.lng) - Number(fromPos.lng)) * t
        };
      }

      function getPathPointContainerPixel(point) {
        if (!map || !point) return null;
        var lat = Number(point.lat);
        var lng = Number(point.lng);
        if (!isFinite(lat) || !isFinite(lng)) return null;
        var proj = map.getProjection();
        if (!proj || typeof proj.containerPointFromCoords !== 'function') return null;
        var px = proj.containerPointFromCoords(new kakao.maps.LatLng(lat, lng));
        if (!px) return null;
        return { x: Number(px.x), y: Number(px.y) };
      }

      function buildPathPixelSegments(pathPoints) {
        var segments = [];
        if (!Array.isArray(pathPoints) || pathPoints.length < 2) return segments;
        for (var i = 0; i < pathPoints.length - 1; i++) {
          var fromPx = getPathPointContainerPixel(pathPoints[i]);
          var toPx = getPathPointContainerPixel(pathPoints[i + 1]);
          if (!fromPx || !toPx) continue;
          var dx = toPx.x - fromPx.x;
          var dy = toPx.y - fromPx.y;
          var distance = Math.sqrt(dx * dx + dy * dy);
          if (!isFinite(distance) || distance < 1) continue;
          segments.push({ from: fromPx, to: toPx });
        }
        return segments;
      }

      function distancePointToSegmentPx(pointPx, fromPx, toPx) {
        if (!pointPx || !fromPx || !toPx) return Infinity;
        var vx = toPx.x - fromPx.x;
        var vy = toPx.y - fromPx.y;
        var wx = pointPx.x - fromPx.x;
        var wy = pointPx.y - fromPx.y;
        var vv = vx * vx + vy * vy;
        if (!isFinite(vv) || vv <= 0) {
          var dx0 = pointPx.x - fromPx.x;
          var dy0 = pointPx.y - fromPx.y;
          return Math.sqrt(dx0 * dx0 + dy0 * dy0);
        }
        var t = (wx * vx + wy * vy) / vv;
        if (t < 0) t = 0;
        if (t > 1) t = 1;
        var projX = fromPx.x + vx * t;
        var projY = fromPx.y + vy * t;
        var dx = pointPx.x - projX;
        var dy = pointPx.y - projY;
        return Math.sqrt(dx * dx + dy * dy);
      }

      function isPointNearPathInPixels(point, pathPixelSegments, thresholdPx) {
        if (!point || !Array.isArray(pathPixelSegments) || pathPixelSegments.length === 0) return false;
        var pointPx = getPathPointContainerPixel(point);
        if (!pointPx) return false;
        var threshold = Number(thresholdPx);
        if (!isFinite(threshold) || threshold <= 0) threshold = 1;
        for (var i = 0; i < pathPixelSegments.length; i++) {
          var seg = pathPixelSegments[i];
          if (!seg) continue;
          if (distancePointToSegmentPx(pointPx, seg.from, seg.to) <= threshold) {
            return true;
          }
        }
        return false;
      }

      function getPathMidPoint(pathPoints) {
        if (!Array.isArray(pathPoints) || pathPoints.length === 0) return null;
        if (pathPoints.length === 1) {
          var lat0 = Number(pathPoints[0].lat);
          var lng0 = Number(pathPoints[0].lng);
          if (isFinite(lat0) && isFinite(lng0)) return { lat: lat0, lng: lng0 };
          return null;
        }

        var segments = [];
        var totalDistance = 0;
        for (var i = 0; i < pathPoints.length - 1; i++) {
          var from = pathPoints[i];
          var to = pathPoints[i + 1];
          var fromLat = Number(from && from.lat);
          var fromLng = Number(from && from.lng);
          var toLat = Number(to && to.lat);
          var toLng = Number(to && to.lng);
          if (!isFinite(fromLat) || !isFinite(fromLng) || !isFinite(toLat) || !isFinite(toLng)) continue;
          var fromPos = { lat: fromLat, lng: fromLng };
          var toPos = { lat: toLat, lng: toLng };
          var segDistance = haversineDistanceMeters(fromPos, toPos);
          if (!isFinite(segDistance) || segDistance <= 0) continue;
          segments.push({ fromPos: fromPos, toPos: toPos, distance: segDistance });
          totalDistance += segDistance;
        }
        if (segments.length === 0 || totalDistance <= 0) {
          var first = pathPoints[0] || {};
          var firstLat = Number(first.lat);
          var firstLng = Number(first.lng);
          if (isFinite(firstLat) && isFinite(firstLng)) return { lat: firstLat, lng: firstLng };
          return null;
        }

        var target = totalDistance * 0.5;
        var acc = 0;
        for (var si = 0; si < segments.length; si++) {
          var seg = segments[si];
          if ((acc + seg.distance) >= target) {
            var ratio = (target - acc) / seg.distance;
            return interpolatePathPoint(seg.fromPos, seg.toPos, ratio);
          }
          acc += seg.distance;
        }

        var lastSeg = segments[segments.length - 1];
        return { lat: lastSeg.toPos.lat, lng: lastSeg.toPos.lng };
      }

      function getWalkTimeMinutesForDisplay(positions, isDepart, walkInfo) {
        var durationSec = Number(walkInfo && walkInfo.duration_sec);
        if (!isFinite(durationSec) || durationSec <= 0) {
          var straightWalk = buildStraightWalkInfo(positions, isDepart);
          durationSec = Number(straightWalk && straightWalk.duration_sec);
        }
        if (!isFinite(durationSec) || durationSec <= 0) return null;
        return Math.max(1, Math.round(durationSec / 60));
      }

      function getWalkTimeBasePoint(walkPathPoints, positions, isDepart) {
        var mid = getPathMidPoint(walkPathPoints);
        if (mid) return mid;
        var leg = getOptionWalkLegPositions(positions, isDepart);
        if (!leg || !leg.fromPos || !leg.toPos) return null;
        var fromLat = Number(leg.fromPos.lat);
        var fromLng = Number(leg.fromPos.lng);
        var toLat = Number(leg.toPos.lat);
        var toLng = Number(leg.toPos.lng);
        if (!isFinite(fromLat) || !isFinite(fromLng) || !isFinite(toLat) || !isFinite(toLng)) return null;
        return interpolatePathPoint({ lat: fromLat, lng: fromLng }, { lat: toLat, lng: toLng }, 0.5);
      }

      function getWalkTimeBlockedRects() {
        var rects = [];
        if (!mapContainer) return rects;
        var containerRect = mapContainer.getBoundingClientRect();
        shuttlePointContents.forEach(function(anchor) {
          if (!anchor || typeof anchor.querySelector !== 'function') return;
          var label = anchor.querySelector('.shuttle-point-label');
          if (!label) return;
          var rect = label.getBoundingClientRect();
          var width = Number(rect.width);
          var height = Number(rect.height);
          if (!isFinite(width) || !isFinite(height) || width <= 0 || height <= 0) return;
          rects.push({
            left: rect.left - containerRect.left,
            top: rect.top - containerRect.top,
            right: rect.right - containerRect.left,
            bottom: rect.bottom - containerRect.top
          });
        });
        return rects;
      }

      function getRectOverlapArea(a, b) {
        var left = Math.max(a.left, b.left);
        var top = Math.max(a.top, b.top);
        var right = Math.min(a.right, b.right);
        var bottom = Math.min(a.bottom, b.bottom);
        if (right <= left || bottom <= top) return 0;
        return (right - left) * (bottom - top);
      }

      function getWalkTimePlacementCandidates() {
        return [
          { dx: 0, dy: -8, placement: 'above' },
          { dx: 54, dy: -8, placement: 'above' },
          { dx: -54, dy: -8, placement: 'above' },
          { dx: 0, dy: 8, placement: 'below' },
          { dx: 54, dy: 8, placement: 'below' },
          { dx: -54, dy: 8, placement: 'below' },
          { dx: 108, dy: -8, placement: 'above' },
          { dx: -108, dy: -8, placement: 'above' },
          { dx: 108, dy: 8, placement: 'below' },
          { dx: -108, dy: 8, placement: 'below' },
          { dx: 0, dy: -44, placement: 'above' },
          { dx: 0, dy: 44, placement: 'below' },
          { dx: 162, dy: -8, placement: 'above' },
          { dx: -162, dy: -8, placement: 'above' },
          { dx: 162, dy: 8, placement: 'below' },
          { dx: -162, dy: 8, placement: 'below' }
        ];
      }

      function refreshWalkTimeOverlayPosition() {
        if (!map || !mapContainer || !shuttleWalkTimeBubble || !shuttleWalkTimeBasePoint) return;
        var basePx = getPathPointContainerPixel(shuttleWalkTimeBasePoint);
        if (!basePx) return;
        var bubbleWidth = Number(shuttleWalkTimeBubble.offsetWidth);
        var bubbleHeight = Number(shuttleWalkTimeBubble.offsetHeight);
        if (!isFinite(bubbleWidth) || !isFinite(bubbleHeight) || bubbleWidth <= 0 || bubbleHeight <= 0) return;
        var mapWidth = Number(mapContainer.clientWidth);
        var mapHeight = Number(mapContainer.clientHeight);
        if (!isFinite(mapWidth) || !isFinite(mapHeight) || mapWidth <= 0 || mapHeight <= 0) return;

        var blockedRects = getWalkTimeBlockedRects();
        var tailSize = 8;
        var edgePad = 6;
        var best = null;
        var candidates = getWalkTimePlacementCandidates();
        for (var ci = 0; ci < candidates.length; ci++) {
          var candidate = candidates[ci];
          var left = basePx.x + candidate.dx - (bubbleWidth / 2);
          var top = (candidate.placement === 'above')
            ? (basePx.y + candidate.dy - bubbleHeight - tailSize)
            : (basePx.y + candidate.dy + tailSize);
          var rect = {
            left: left,
            top: top,
            right: left + bubbleWidth,
            bottom: top + bubbleHeight
          };

          var overlapArea = 0;
          for (var bi = 0; bi < blockedRects.length; bi++) {
            overlapArea += getRectOverlapArea(rect, blockedRects[bi]);
          }

          var overflow =
            Math.max(0, edgePad - rect.left) +
            Math.max(0, edgePad - rect.top) +
            Math.max(0, rect.right - (mapWidth - edgePad)) +
            Math.max(0, rect.bottom - (mapHeight - edgePad));
          var distancePenalty = Math.abs(candidate.dx) * 0.12 + Math.abs(candidate.dy) * 0.08 +
            (candidate.placement === 'below' ? 1 : 0);
          var score = overlapArea * 1000 + overflow * 60 + distancePenalty;
          if (!best || score < best.score) {
            best = {
              score: score,
              rect: rect,
              placement: candidate.placement,
              tailX: Math.max(10, Math.min(bubbleWidth - 10, basePx.x - left))
            };
          }
        }
        if (!best) return;

        shuttleWalkTimeBubble.style.left = Math.round(best.rect.left - basePx.x) + 'px';
        shuttleWalkTimeBubble.style.top = Math.round(best.rect.top - basePx.y) + 'px';
        shuttleWalkTimeBubble.style.setProperty('--tail-x', Math.round(best.tailX) + 'px');
        shuttleWalkTimeBubble.classList.remove('tail-down', 'tail-up');
        shuttleWalkTimeBubble.classList.add(best.placement === 'above' ? 'tail-down' : 'tail-up');
      }

      function renderWalkTimeOverlay(walkPathPoints, positions, isDepart, walkInfo) {
        clearWalkTimeOverlay();
        var minutes = getWalkTimeMinutesForDisplay(positions, isDepart, walkInfo);
        if (minutes == null) return;
        var basePoint = getWalkTimeBasePoint(walkPathPoints, positions, isDepart);
        if (!basePoint) return;

        var anchor = document.createElement('div');
        anchor.className = 'walk-time-anchor';
        var bubble = document.createElement('div');
        bubble.className = 'walk-time-bubble tail-down';
        bubble.innerHTML =
          '<span class="walk-time-icon" aria-hidden="true"></span>' +
          '<span class="walk-time-text">약 ' + String(minutes) + '분</span>';
        anchor.appendChild(bubble);

        var overlay = new kakao.maps.CustomOverlay({
          position: new kakao.maps.LatLng(basePoint.lat, basePoint.lng),
          content: anchor,
          xAnchor: 0.5,
          yAnchor: 0.5
        });
        if (typeof overlay.setZIndex === 'function') overlay.setZIndex(12);
        overlay.setMap(map);

        shuttleWalkTimeOverlay = overlay;
        shuttleWalkTimeAnchor = anchor;
        shuttleWalkTimeBubble = bubble;
        shuttleWalkTimeBasePoint = basePoint;

        refreshWalkTimeOverlayPosition();
        setTimeout(refreshWalkTimeOverlayPosition, 0);
      }

      function clipLineSegmentToRect(fromPx, toPx, rect) {
        var x0 = Number(fromPx && fromPx.x);
        var y0 = Number(fromPx && fromPx.y);
        var x1 = Number(toPx && toPx.x);
        var y1 = Number(toPx && toPx.y);
        if (!isFinite(x0) || !isFinite(y0) || !isFinite(x1) || !isFinite(y1)) return null;

        var dx = x1 - x0;
        var dy = y1 - y0;
        var p = [-dx, dx, -dy, dy];
        var q = [x0 - rect.minX, rect.maxX - x0, y0 - rect.minY, rect.maxY - y0];
        var t0 = 0;
        var t1 = 1;

        for (var i = 0; i < 4; i++) {
          if (p[i] === 0) {
            if (q[i] < 0) return null;
            continue;
          }
          var r = q[i] / p[i];
          if (p[i] < 0) {
            if (r > t1) return null;
            if (r > t0) t0 = r;
          } else {
            if (r < t0) return null;
            if (r < t1) t1 = r;
          }
        }
        if (t1 < t0) return null;
        return { t0: t0, t1: t1 };
      }

      function addRouteDirectionArrow(point, rotateDeg) {
        if (!point || !isFinite(point.lat) || !isFinite(point.lng) || !isFinite(rotateDeg)) return;
        var arrowWrap = document.createElement('div');
        arrowWrap.className = 'route-direction-arrow-wrap';
        arrowWrap.style.transform = 'rotate(' + rotateDeg.toFixed(2) + 'deg)';
        var arrowShape = document.createElement('span');
        arrowShape.className = 'route-direction-arrow';
        arrowWrap.appendChild(arrowShape);

        var overlay = new kakao.maps.CustomOverlay({
          position: new kakao.maps.LatLng(point.lat, point.lng),
          content: arrowWrap,
          xAnchor: 0.5,
          yAnchor: 0.5
        });
        // Always render route arrows below shuttle point icons/labels.
        if (typeof overlay.setZIndex === 'function') overlay.setZIndex(0);
        overlay.setMap(map);
        shuttleDirectionArrowOverlays.push(overlay);
        shuttleDirectionArrowElements.push(arrowWrap);
      }

      function getRoutePathStyle(kind) {
        if (kind === 'bus') {
          return {
            outerColor: SHUTTLE_ROUTE_BUS_OUTER_COLOR,
            innerColor: SHUTTLE_ROUTE_BUS_INNER_COLOR
          };
        }
        return {
          outerColor: SHUTTLE_ROUTE_WALK_OUTER_COLOR,
          innerColor: SHUTTLE_ROUTE_WALK_INNER_COLOR
        };
      }

      function drawRouteDirectionArrows(pathPoints, opts) {
        if (!Array.isArray(pathPoints) || pathPoints.length < 2) return;
        opts = opts || {};
        var kind = String(opts.kind || 'bus').toLowerCase();
        var occlusionPathPoints = Array.isArray(opts.occlusionPathPoints) ? opts.occlusionPathPoints : [];
        var occlusionThresholdPx = Number(opts.occlusionThresholdPx);
        if (!isFinite(occlusionThresholdPx) || occlusionThresholdPx <= 0) {
          occlusionThresholdPx = SHUTTLE_ROUTE_OUTER_WEIGHT * 0.9;
        }
        var occlusionPathPixelSegments = (kind === 'bus' && occlusionPathPoints.length >= 2)
          ? buildPathPixelSegments(occlusionPathPoints)
          : [];
        var mapWidth = mapContainer ? Number(mapContainer.clientWidth) : 0;
        var mapHeight = mapContainer ? Number(mapContainer.clientHeight) : 0;
        if (!isFinite(mapWidth) || !isFinite(mapHeight) || mapWidth <= 0 || mapHeight <= 0) return;

        var clipMargin = 120;
        var clipRect = {
          minX: -clipMargin,
          minY: -clipMargin,
          maxX: mapWidth + clipMargin,
          maxY: mapHeight + clipMargin
        };

        var visibleSegments = [];
        var visibleTotalPx = 0;
        var longestSegment = null;

        for (var i = 0; i < pathPoints.length - 1; i++) {
          var rawFrom = pathPoints[i];
          var rawTo = pathPoints[i + 1];
          var rawFromPx = getPathPointContainerPixel(rawFrom);
          var rawToPx = getPathPointContainerPixel(rawTo);
          if (!rawFromPx || !rawToPx) continue;

          var clip = clipLineSegmentToRect(rawFromPx, rawToPx, clipRect);
          if (!clip) continue;

          var clippedFromPos = interpolatePathPoint(rawFrom, rawTo, clip.t0);
          var clippedToPos = interpolatePathPoint(rawFrom, rawTo, clip.t1);
          var clippedFromPx = {
            x: rawFromPx.x + (rawToPx.x - rawFromPx.x) * clip.t0,
            y: rawFromPx.y + (rawToPx.y - rawFromPx.y) * clip.t0
          };
          var clippedToPx = {
            x: rawFromPx.x + (rawToPx.x - rawFromPx.x) * clip.t1,
            y: rawFromPx.y + (rawToPx.y - rawFromPx.y) * clip.t1
          };

          var dx = clippedToPx.x - clippedFromPx.x;
          var dy = clippedToPx.y - clippedFromPx.y;
          var segDistancePx = Math.sqrt(dx * dx + dy * dy);
          if (!isFinite(segDistancePx) || segDistancePx < 3) continue;

          var rotateDeg = Math.atan2(dy, dx) * 180 / Math.PI;
          var segment = {
            fromPos: clippedFromPos,
            toPos: clippedToPos,
            distancePx: segDistancePx,
            rotateDeg: rotateDeg
          };
          visibleSegments.push(segment);
          visibleTotalPx += segDistancePx;
          if (!longestSegment || segDistancePx > longestSegment.distancePx) longestSegment = segment;
        }

        if (visibleSegments.length === 0) return;

        var spacingPx = SHUTTLE_ROUTE_ARROW_SPACING_PX;
        var minSpacingPx = 10;
        var maxSpacingPx = 64;
        var targetMinArrows = 16;
        var targetMaxArrows = Math.min(SHUTTLE_ROUTE_ARROW_MAX_COUNT, 220);

        var spacingByMin = visibleTotalPx / targetMinArrows;
        if (isFinite(spacingByMin) && spacingByMin > 0) spacingPx = Math.min(spacingPx, spacingByMin);
        var spacingByMax = visibleTotalPx / targetMaxArrows;
        if (isFinite(spacingByMax) && spacingByMax > 0) spacingPx = Math.max(spacingPx, spacingByMax);
        spacingPx = Math.max(minSpacingPx, Math.min(maxSpacingPx, spacingPx));

        var distanceToNextArrow = spacingPx * 0.5;
        for (var si = 0; si < visibleSegments.length; si++) {
          var seg = visibleSegments[si];
          while (distanceToNextArrow <= seg.distancePx && shuttleDirectionArrowOverlays.length < SHUTTLE_ROUTE_ARROW_MAX_COUNT) {
            var ratio = distanceToNextArrow / seg.distancePx;
            var arrowPoint = interpolatePathPoint(seg.fromPos, seg.toPos, ratio);
            var shouldSkipArrow = (kind === 'bus') &&
              isPointNearPathInPixels(arrowPoint, occlusionPathPixelSegments, occlusionThresholdPx);
            if (!shouldSkipArrow) {
              addRouteDirectionArrow(arrowPoint, seg.rotateDeg);
            }
            distanceToNextArrow += spacingPx;
          }
          distanceToNextArrow -= seg.distancePx;
        }

        if (shuttleDirectionArrowOverlays.length === 0 && longestSegment && longestSegment.distancePx >= 8) {
          var fallbackPoint = interpolatePathPoint(longestSegment.fromPos, longestSegment.toPos, 0.5);
          var skipFallback = (kind === 'bus') &&
            isPointNearPathInPixels(fallbackPoint, occlusionPathPixelSegments, occlusionThresholdPx);
          if (!skipFallback) {
            addRouteDirectionArrow(fallbackPoint, longestSegment.rotateDeg);
          }
        }
      }

      function renderStyledRoutePath(pathPoints, kind) {
        var path = pathPoints.map(function(p) { return new kakao.maps.LatLng(p.lat, p.lng); });
        if (path.length === 0) return path;
        var style = getRoutePathStyle(kind);

        var outerLine = new kakao.maps.Polyline({
          path: path,
          strokeWeight: SHUTTLE_ROUTE_OUTER_WEIGHT,
          strokeColor: style.outerColor,
          strokeOpacity: 0.95
        });
        outerLine.__baseOpacity = 0.95;
        outerLine.setMap(map);
        shuttlePathLayers.push(outerLine);

        var innerLine = new kakao.maps.Polyline({
          path: path,
          strokeWeight: SHUTTLE_ROUTE_INNER_WEIGHT,
          strokeColor: style.innerColor,
          strokeOpacity: 0.92
        });
        innerLine.__baseOpacity = 0.92;
        innerLine.setMap(map);
        shuttlePathLayers.push(innerLine);
        shuttleLine = innerLine;
        return path;
      }

      function renderOptionOnMap(option, placeName, isDepart, walkInfo, selectedCard, showWalkTimeBubble, opts) {
        opts = opts || {};
        var skipViewportFit = !!opts.skipViewportFit;
        clearSearchOverlays();
        clearShuttleOverlays();
        var positions = Array.isArray(option.positions) ? option.positions : [];
        var walkPathPoints = (walkInfo && Array.isArray(walkInfo.path_points)) ? walkInfo.path_points : [];
        var pathSegments = buildOptionPathSegments(option, positions, isDepart, walkPathPoints);
        var path = [];
        var timeStr = (option.board_time != null && option.board_time !== '') ? option.board_time : getDepartureTimeStr();
        var labels = isDepart
          ? [placeName, option.nearest_stop_name, option.terminus_name]
          : [option.start_stop_name, option.getoff_stop_name, placeName];
        // z-index 우선순위 (값이 클수록 앞에 표시)
        // 출근: 탑승(i=1) > 출발지(i=0) > 하차(i=2)
        // 퇴근: 하차(i=1) > 탑승(i=0) > 목적지(i=2)
        var zOrder = isDepart ? [2, 3, 1] : [2, 3, 1];
        positions.forEach(function(p, i) {
          var pos = new kakao.maps.LatLng(p.lat, p.lng);
          var pinEl = document.createElement('div');
          var iconClass = (i === 0) ? 'icon-start' : (i === 1 ? 'icon-stop' : 'icon-arrive');
          pinEl.className = 'shuttle-point-pin ' + iconClass;
          var pinOverlay = new kakao.maps.CustomOverlay({
            position: pos,
            content: pinEl,
            xAnchor: 0.5,
            yAnchor: 0.5
          });
          pinOverlay.setZIndex(zOrder[i]);
          pinOverlay.setMap(map);
          shuttlePointOverlays.push(pinOverlay);
          var hidePointLabel = (isDepart && i === 0) || (!isDepart && i === 2);
          if (hidePointLabel) return;
          var pointLabel = labels[i] || p.label || '';
          var namePart = '<span class="shuttle-point-name">' + escapeHtml(pointLabel) + '</span>';
          var tagPart = '';
          if (isDepart && i === 1) tagPart = '<span class="time-tag">(' + timeStr + '분 노선 탑승)</span>';
          if (!isDepart && i === 0) tagPart = '<span class="time-tag">(' + timeStr + '분 노선 탑승)</span>';
          if (!isDepart && i === 1) {
            var seq = (option.getoff_stop_sequence != null && option.getoff_stop_sequence !== '')
              ? option.getoff_stop_sequence
              : null;
            if (seq == null && option.route_stops && option.route_stops.length > 0) {
              var targetName = String(option.getoff_stop_name || '').trim();
              for (var si = 0; si < option.route_stops.length; si++) {
                var rs = option.route_stops[si] || {};
                if (String(rs.stop_name || '').trim() === targetName) {
                  if (rs.sequence != null && rs.sequence !== '') seq = rs.sequence;
                  break;
                }
              }
            }
            var hasSeq = (seq != null && seq !== '');
            tagPart = '<span class="getoff-tag">(' + (hasSeq ? String(seq) + ' 번째 하차' : '하차') + ')</span>';
          }
          var highlightTarget = getOptionLabelHighlightTarget(option, isDepart, i);
          var isClickableLabel = !!(selectedCard && highlightTarget);
          var labelAnchor = document.createElement('div');
          labelAnchor.className = 'shuttle-label-anchor' + (isClickableLabel ? ' clickable' : '');
          labelAnchor.innerHTML = '<div class="shuttle-point-label shuttle-point-' + i + '">' + namePart + tagPart + '</div>';
          if (isClickableLabel) {
            attachRouteOptionLabelClickHandler(labelAnchor, selectedCard, option, placeName, isDepart, highlightTarget);
          }
          var labelOverlay = new kakao.maps.CustomOverlay({
            position: pos,
            content: labelAnchor,
            xAnchor: 0.5,
            yAnchor: 1.0
          });
          labelOverlay.setZIndex(zOrder[i] + 10);
          labelOverlay.setMap(map);
          shuttlePointOverlays.push(labelOverlay);
          shuttlePointContents.push(labelAnchor);
        });
        // Always draw bus first, then walk so walk segments stay on top when overlapped.
        renderStyledRoutePath(pathSegments.busPathPoints, 'bus');
        renderStyledRoutePath(pathSegments.walkPathPoints, 'walk');
        shuttleBusPathPoints = pathSegments.busPathPoints.slice();
        shuttleWalkPathPoints = pathSegments.walkPathPoints.slice();
        shuttlePositions = pathSegments.allPathPoints.slice();
        drawRouteDirectionArrows(shuttleBusPathPoints, {
          kind: 'bus',
          occlusionPathPoints: shuttleWalkPathPoints
        });
        drawRouteDirectionArrows(shuttleWalkPathPoints, { kind: 'walk' });
        path = shuttlePositions.map(function(p) { return new kakao.maps.LatLng(p.lat, p.lng); });
        var bounds = new kakao.maps.LatLngBounds();
        path.forEach(function(p) { bounds.extend(p); });
        var sw = bounds.getSouthWest();
        var ne = bounds.getNorthEast();
        var latSpan = ne.getLat() - sw.getLat();
        var lngSpan = ne.getLng() - sw.getLng();
        var pad = 0.18;
        var padTop = 0.28;
        if (latSpan < 0.002) latSpan = 0.01;
        if (lngSpan < 0.002) lngSpan = 0.01;
        bounds.extend(new kakao.maps.LatLng(sw.getLat() - latSpan * pad, sw.getLng()));
        bounds.extend(new kakao.maps.LatLng(ne.getLat() + latSpan * padTop, ne.getLng()));
        bounds.extend(new kakao.maps.LatLng(sw.getLat(), sw.getLng() - lngSpan * pad));
        bounds.extend(new kakao.maps.LatLng(ne.getLat(), ne.getLng() + lngSpan * pad));
        if (!skipViewportFit) {
          map.setBounds(bounds);
        }
        if (showWalkTimeBubble) {
          renderWalkTimeOverlay(pathSegments.walkPathPoints, positions, isDepart, walkInfo);
        } else {
          clearWalkTimeOverlay();
        }
        if (!isMobile()) {
          var routeNameHtml = '<span class="hl">' + escapeHtml(option.route_name) + '</span>';
          var routeTimeHtml = '<span class="hl">' + escapeHtml(timeStr) + '분</span>';
          var stopBadgeHtml = function(nameText) {
            return '<span class="msg-pill msg-pill-stop"><span class="msg-inline-icon msg-icon-stop" aria-hidden="true"></span>' +
              '<span>' + escapeHtml(nameText || '') + '</span></span>';
          };
          var startBadgeHtml = function(nameText) {
            return '<span class="msg-pill msg-pill-start"><span class="msg-inline-icon msg-icon-start" aria-hidden="true"></span>' +
              '<span>' + escapeHtml(nameText || '') + '</span></span>';
          };
          var msgHtml = isDepart
            ? escapeHtml(placeName) + '에서 출근하기 위해서는 ' + stopBadgeHtml(option.nearest_stop_name) +
              ' 정류장에서 ' + routeNameHtml + ' ' + routeTimeHtml + ' 출근 노선 버스에 탑승하세요.'
            : escapeHtml(placeName) + '(으)로 가기 위해서는 ' + routeNameHtml + ' ' + routeTimeHtml +
              ' 퇴근 노선을 ' + startBadgeHtml(option.start_stop_name) + '에서 탑승하고 ' +
              stopBadgeHtml(option.getoff_stop_name) + '에서 하차하세요.';
          showShuttleResult(msgHtml);
        } else {
          shuttleMessage.classList.remove('show');
        }
        scheduleRouteVisualFit();
      }

      function drawOptionOnMap(option, placeName, isDepart, selectedCard) {
        activeOptionDrawToken += 1;
        var drawToken = activeOptionDrawToken;
        var positions = Array.isArray(option.positions) ? option.positions : [];
        function applyWalkFallback(reason) {
          applySelectedRouteCardDetail(
            selectedCard,
            option,
            placeName,
            isDepart,
            buildStraightLineFallbackWalkInfo(positions, isDepart, reason)
          );
          clearWalkTimeOverlay();
        }
        var straightWalk = buildStraightWalkInfo(positions, isDepart);
        applySelectedRouteCardDetail(selectedCard, option, placeName, isDepart, straightWalk);
        renderOptionOnMap(option, placeName, isDepart, null, selectedCard, false, { skipViewportFit: false });

        if (!walkOtpEnabled) return;
        var leg = getOptionWalkLegPositions(positions, isDepart);
        if (!leg) return;

        var walkCacheKey = buildWalkPathCacheKey(leg.fromPos, leg.toPos);
        if (walkCacheKey && walkPathCache.has(walkCacheKey)) {
          var cachedWalk = walkPathCache.get(walkCacheKey);
          if (cachedWalk) {
            if (isSuccessfulWalkPathResult(cachedWalk)) {
              resetWalkOtpTimeoutBackoff();
              applySelectedRouteCardDetail(selectedCard, option, placeName, isDepart, cachedWalk);
              renderOptionOnMap(option, placeName, isDepart, cachedWalk, selectedCard, true, { skipViewportFit: true });
            } else {
              applyWalkFallback(String(cachedWalk.status || 'otp_empty_itineraries'));
            }
          }
          return;
        }

        var hasPendingWalk = !!(walkCacheKey && walkPathPending.has(walkCacheKey));
        if (isWalkOtpBackoffActive() && !hasPendingWalk) {
          applyWalkFallback('otp_backoff');
          return;
        }

        var walkPromise = hasPendingWalk
          ? walkPathPending.get(walkCacheKey)
          : fetchWalkPathData(leg.fromPos, leg.toPos);
        if (!walkPromise) return;
        // Timeout은 "백오프 신호"로만 사용하고, 실제 walk-path 응답이 늦게 와도
        // 현재 활성 노선이면 즉시 UI(도보 시간/말풍선)를 갱신한다.
        var walkSettled = false;
        promiseWithTimeout(walkPromise, WALK_OTP_TIMEOUT_MS).catch(function(err) {
          if (drawToken !== activeOptionDrawToken) return;
          if (walkSettled) return;
          if (err && err.message === 'walk_path_timeout') {
            registerWalkOtpTimeoutBackoff();
          }
        });

        walkPromise
          .then(function(walkResult) {
            walkSettled = true;
            if (drawToken !== activeOptionDrawToken) return;
            if (!walkResult) {
              applyWalkFallback('otp_empty_response');
              return;
            }
            if (isSuccessfulWalkPathResult(walkResult)) {
              resetWalkOtpTimeoutBackoff();
              applySelectedRouteCardDetail(selectedCard, option, placeName, isDepart, walkResult);
              renderOptionOnMap(option, placeName, isDepart, walkResult, selectedCard, true, { skipViewportFit: true });
              return;
            }
            applyWalkFallback(String(walkResult.status || 'otp_empty_itineraries'));
          })
          .catch(function() {
            walkSettled = true;
            if (drawToken !== activeOptionDrawToken) return;
            applyWalkFallback('otp_request_failed');
          });
      }

      function drawRouteDetailOnMap(option, placeName, isDepart, highlightTarget) {
        activeOptionDrawToken += 1;
        clearSearchOverlays();
        clearShuttleOverlays();
        var routeStops = option.route_stops || [];
        if (routeStops.length === 0) return;
        var highlightSeq = normalizeStopSequence(highlightTarget && highlightTarget.sequence);
        var highlightName = normalizeStopName(highlightTarget && highlightTarget.name);
        var totalStops = routeStops.length;
        var pathPoints = buildRouteDetailPathPoints(routeStops);
        var path = [];
        routeStops.forEach(function(s, i) {
          var pos = new kakao.maps.LatLng(s.lat, s.lng);
          var pinEl = document.createElement('div');
          pinEl.className = 'shuttle-point-pin icon-stop';
          var pinZIndex = totalStops - i;
          var pinOverlay = new kakao.maps.CustomOverlay({
            position: pos,
            content: pinEl,
            xAnchor: 0.5,
            yAnchor: 0.5
          });
          pinOverlay.setZIndex(pinZIndex);
          pinOverlay.setMap(map);
          shuttlePointOverlays.push(pinOverlay);
          var currentSeq = normalizeStopSequence(s.sequence);
          var currentName = normalizeStopName(s.stop_name);
          var isHighlightedStop = false;
          if (highlightSeq) isHighlightedStop = (currentSeq === highlightSeq);
          if (!isHighlightedStop && highlightName) isHighlightedStop = (currentName === highlightName);
          var labelAnchor = document.createElement('div');
          labelAnchor.className = 'shuttle-label-anchor';
          labelAnchor.innerHTML = '<div class="shuttle-point-label shuttle-point-' + i + (isHighlightedStop ? ' is-highlight' : '') + '">' +
            '<span class="shuttle-point-name">' + escapeHtml(s.sequence + '. ' + s.stop_name) + '</span></div>';
          var labelZIndex = totalStops - i + totalStops + (isHighlightedStop ? (totalStops + 20) : 0);
          var labelOverlay = new kakao.maps.CustomOverlay({
            position: pos,
            content: labelAnchor,
            xAnchor: 0.5,
            yAnchor: 1.0
          });
          labelOverlay.setZIndex(labelZIndex);
          labelOverlay.setMap(map);
          shuttlePointOverlays.push(labelOverlay);
          shuttlePointContents.push(labelAnchor);
        });
        path = renderStyledRoutePath(pathPoints, 'bus');
        shuttleBusPathPoints = pathPoints.slice();
        shuttleWalkPathPoints = [];
        shuttlePositions = pathPoints.slice();
        drawRouteDirectionArrows(shuttleBusPathPoints, { kind: 'bus' });
        var bounds = new kakao.maps.LatLngBounds();
        path.forEach(function(p) { bounds.extend(p); });
        var sw = bounds.getSouthWest();
        var ne = bounds.getNorthEast();
        var latSpan = ne.getLat() - sw.getLat();
        var lngSpan = ne.getLng() - sw.getLng();
        var pad = 0.12;
        if (latSpan < 0.002) latSpan = 0.01;
        if (lngSpan < 0.002) lngSpan = 0.01;
        bounds.extend(new kakao.maps.LatLng(sw.getLat() - latSpan * pad, sw.getLng()));
        bounds.extend(new kakao.maps.LatLng(ne.getLat() + latSpan * pad, ne.getLng()));
        bounds.extend(new kakao.maps.LatLng(sw.getLat(), sw.getLng() - lngSpan * pad));
        bounds.extend(new kakao.maps.LatLng(ne.getLat(), ne.getLng() + lngSpan * pad));
        map.setBounds(bounds);
        shuttleMessage.classList.remove('show');
        scheduleRouteVisualFit();
      }

      function adjustShuttleLabels() {
        /* Labels stay fixed above their pins; overlapping is allowed */
        if (!shuttlePointContents || shuttlePointContents.length === 0) return;
        shuttlePointContents.forEach(function(anchor) {
          var el = anchor.querySelector('.shuttle-point-label');
          if (el) el.style.transform = '';
        });
      }

      function resetShuttleLabelTransforms() {
        if (!shuttlePointContents || shuttlePointContents.length === 0) return;
        shuttlePointContents.forEach(function(anchor) {
          var el = anchor.querySelector('.shuttle-point-label');
          if (el) el.style.transform = '';
        });
      }

      function normalizeStopSequence(value) {
        var num = Number(value);
        if (isFinite(num)) return String(num);
        var text = String(value == null ? '' : value).trim();
        return text;
      }

      function normalizeStopName(value) {
        return String(value == null ? '' : value).trim();
      }

      function getOptionLabelHighlightTarget(option, isDepart, pointIndex) {
        if (isDepart) {
          if (pointIndex === 1) {
            return {
              sequence: option.nearest_stop_sequence,
              name: option.nearest_stop_name
            };
          }
          if (pointIndex === 2) {
            return {
              sequence: option.terminus_sequence,
              name: option.terminus_name
            };
          }
          return null;
        }
        if (pointIndex === 0) {
          return {
            sequence: option.start_stop_sequence,
            name: option.start_stop_name
          };
        }
        if (pointIndex === 1) {
          return {
            sequence: option.getoff_stop_sequence,
            name: option.getoff_stop_name
          };
        }
        return null;
      }

      function attachRouteOptionLabelClickHandler(labelAnchor, selectedCard, option, placeName, isDepart, highlightTarget) {
        if (!labelAnchor || !selectedCard || !highlightTarget) return;
        labelAnchor.setAttribute('role', 'button');
        labelAnchor.setAttribute('tabindex', '0');
        labelAnchor.setAttribute('title', '노선 상세 보기');
        var dragThresholdPx = 8;
        var pointerState = {
          active: false,
          pointerId: null,
          startX: 0,
          startY: 0,
          moved: false,
          movedAt: 0
        };

        function beginPointerTracking(e) {
          if (!e) return;
          pointerState.active = true;
          pointerState.pointerId = e.pointerId;
          pointerState.startX = Number(e.clientX) || 0;
          pointerState.startY = Number(e.clientY) || 0;
          pointerState.moved = false;
          pointerState.movedAt = 0;
        }

        function updatePointerTracking(e) {
          if (!pointerState.active || !e) return;
          if (pointerState.pointerId != null && e.pointerId != null && e.pointerId !== pointerState.pointerId) return;
          if (pointerState.moved) return;
          var dx = (Number(e.clientX) || 0) - pointerState.startX;
          var dy = (Number(e.clientY) || 0) - pointerState.startY;
          if (Math.sqrt(dx * dx + dy * dy) >= dragThresholdPx) {
            pointerState.moved = true;
            pointerState.movedAt = Date.now();
          }
        }

        function endPointerTracking(e) {
          updatePointerTracking(e);
          pointerState.active = false;
          pointerState.pointerId = null;
        }

        labelAnchor.addEventListener('pointerdown', beginPointerTracking);
        labelAnchor.addEventListener('pointermove', updatePointerTracking);
        labelAnchor.addEventListener('pointerup', endPointerTracking);
        labelAnchor.addEventListener('pointercancel', endPointerTracking);
        labelAnchor.addEventListener('pointerleave', function() {
          pointerState.active = false;
          pointerState.pointerId = null;
        });

        function handleActivate(e) {
          e.stopPropagation();
          e.preventDefault();
          if (blurFocusedRouteModePlaceInputIfActive()) {
            mapClickIgnore = true;
            return;
          }
          var isKeyboard = !!(e && e.type === 'keydown');
          if (!isKeyboard) {
            var movedRecently = pointerState.movedAt > 0 && (Date.now() - pointerState.movedAt) < 500;
            var mapDraggedRecently = mapDragStartedAt > 0 && (Date.now() - mapDragStartedAt) < 350;
            if (pointerState.moved || movedRecently || mapDraggedRecently) {
              pointerState.moved = false;
              pointerState.movedAt = 0;
              return;
            }
          }
          mapClickIgnore = true;
          openRouteDetailFromMapLabel(selectedCard, option, placeName, isDepart, highlightTarget);
        }
        labelAnchor.addEventListener('click', handleActivate);
        labelAnchor.addEventListener('keydown', function(e) {
          if (e.key !== 'Enter' && e.key !== ' ') return;
          handleActivate(e);
        });
      }

      function getRouteCardIndex(card, fallbackIndex) {
        if (!card) return (fallbackIndex != null ? fallbackIndex : -1);
        var raw = card.getAttribute('data-route-index');
        var idx = Number(raw);
        if (isFinite(idx) && idx >= 0) return idx;
        return (fallbackIndex != null ? fallbackIndex : -1);
      }

      function activateRouteCardOptionView(card, option, placeName, isDepart) {
        if (!card || !option) return;
        routeLabelTriggeredDetailState = null;
        routeOptionsWrap.querySelectorAll('.route-option-card').forEach(function(c) {
          c.classList.remove('selected', 'expanded');
        });
        card.classList.add('selected');
        expandedOptionIndex = -1;
        drawOptionOnMap(option, placeName, isDepart, card);
      }

      function activateRouteCardDetailView(card, option, placeName, isDepart, idx, highlightTarget, isFromMapLabel) {
        if (!card || !option) return;
        routeOptionsWrap.querySelectorAll('.route-option-card').forEach(function(c) {
          c.classList.remove('expanded');
          if (c !== card) c.classList.remove('selected');
        });
        card.classList.add('expanded', 'selected');
        expandedOptionIndex = getRouteCardIndex(card, idx);
        drawRouteDetailOnMap(option, placeName, isDepart, highlightTarget || null);
        if (isFromMapLabel) {
          routeLabelTriggeredDetailState = {
            card: card,
            option: option,
            placeName: placeName,
            isDepart: isDepart
          };
        } else {
          routeLabelTriggeredDetailState = null;
        }
      }

      function openRouteDetailFromMapLabel(selectedCard, option, placeName, isDepart, highlightTarget) {
        if (!selectedCard || !option) return;
        activateRouteCardDetailView(
          selectedCard,
          option,
          placeName,
          isDepart,
          getRouteCardIndex(selectedCard, -1),
          highlightTarget,
