nameOverride: db
fullnameOverride: db

cluster:
  name: db
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  enableSuperuserAccess: true
  superuserSecretName: db-superuser
  initdb:
    database: shuttlego
    owner: shuttlego
    ownerSecretName: db-app
  nodeSelector:
    workload: postgres
  tolerations:
    - key: workload
      operator: Equal
      value: postgres
      effect: NoSchedule
  resources:
    requests:
      cpu: "3000m"
      memory: 12Gi
    limits:
      cpu: "3000m"
      memory: 12Gi
  storage:
    size: 200Gi
    storageClass: gp2
    pvcTemplate: {}
    staticPVs:
      enabled: false
      names: []
      volumeHandles: []
      accessModes:
        - ReadWriteOnce
      fsType: ext4
      labels: {}
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname
  pdb:
    enabled: true
    minAvailable: 2
  postgresParameters:
    maxConnections: "500"
    sharedBuffers: "3GB"
    effectiveCacheSize: "9GB"
    workMem: "16MB"
  irsaRoleArn: ""
  irsaRoleAnnotationKey: eks.amazonaws.com/role-arn
  backup:
    enabled: false
    bucketName: your-backup-bucket
    destinationPrefix: platform/prod/db
    endpointURL: https://s3.ap-northeast-1.amazonaws.com
    s3Credentials:
      inheritFromIAMRole: false
    retentionPolicy: 30d
    wal:
      compression: gzip
      maxParallel: 8
    data:
      compression: gzip
      immediateCheckpoint: false
    scheduled:
      enabled: true
      schedule: "0 0 3 * * *"
      immediate: true
      ownerReference: self

pooler:
  enabled: true
  name: db-rw-pooler
  instances: 2
  type: rw
  nodeSelector:
    workload: postgres
  tolerations:
    - key: workload
      operator: Equal
      value: postgres
      effect: NoSchedule
  resources:
    requests:
      cpu: 300m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 256Mi
  pgbouncer:
    poolMode: transaction
    maxClientConn: "2000"
    defaultPoolSize: "30"
    reservePoolSize: "15"

poolerReadOnly:
  enabled: false
  name: db-ro-pooler
  instances: 2
  type: ro
  nodeSelector:
    workload: postgres
  tolerations:
    - key: workload
      operator: Equal
      value: postgres
      effect: NoSchedule
  resources:
    requests:
      cpu: 300m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 256Mi
  pgbouncer:
    poolMode: transaction
    maxClientConn: "2000"
    defaultPoolSize: "30"
    reservePoolSize: "15"
