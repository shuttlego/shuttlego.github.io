{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "shuttle-backend.serviceAccountName" . }}
  labels:
    {{- include "shuttle-backend.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.lease.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "shuttle-backend.fullname" . }}-lease-manager
  labels:
    {{- include "shuttle-backend.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "shuttle-backend.fullname" . }}-lease-manager
  labels:
    {{- include "shuttle-backend.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "shuttle-backend.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "shuttle-backend.fullname" . }}-lease-manager
{{- end }}
